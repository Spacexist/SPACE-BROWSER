<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自由画布 · 无限坐标平面</title>
  <link rel="stylesheet" href="canvas/canvas.css?v=20260704-1">
  <link rel="stylesheet" href="card/cards.css?v=20260704-1">
  <link rel="stylesheet" href="focus-manage/focus-manager.css?v=20260704-1">
  <link rel="stylesheet" href="../test/agent-test.css?v=20260704-1">
  <!-- Load SheetJS for local Excel parsing and rendering -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  
  <div id="viewport">
    <!-- Dynamic Dot Grid Background -->
    <canvas id="dot-grid"></canvas>
    <canvas id="dot-grid-effect" aria-hidden="true"></canvas>
    
    <!-- Infinite World coordinates container -->
    <div id="world"></div>

    <!-- Read-only canvas focus state -->
    <div class="canvas-focus-status" id="canvas-focus-status"
      role="status" aria-live="polite" aria-label="画布未聚焦" title="画布未聚焦">
      <span class="canvas-focus-dot" aria-hidden="true"></span>
    </div>
    
    <!-- Floating Toolbar -->
    <div class="floating-toolbar collapsed" id="floating-toolbar">
      <div class="toolbar-content">
        <button class="toolbar-btn" id="btn-add-image">
          <span>🖼️</span>导入图片/文件
        </button>
        <input type="file" id="image-loader" accept="image/png, image/jpeg, image/jpg, .xlsx, .xls, .html, .htm" style="display: none;">
        <div class="divider"></div>
        <button class="toolbar-btn secondary" id="btn-zoom-out" title="缩小画布">-</button>
        <span class="zoom-label" id="zoom-label">100%</span>
        <button class="toolbar-btn secondary" id="btn-zoom-in" title="放大画布">+</button>
        <div class="divider"></div>
        <button class="toolbar-btn secondary" id="btn-reset-view">自适应居中</button>
      </div>

      <button class="toolbar-toggle" id="toolbar-toggle" type="button"
        title="展开工具栏" aria-label="展开工具栏" aria-expanded="false">
        <span class="toggle-icon" aria-hidden="true">•••</span>
      </button>
    </div>

    <!-- Canvas context menu: creation actions live at the pointer position. -->
    <div class="canvas-context-menu" id="canvas-context-menu" role="menu" hidden>
      <div class="canvas-context-title">新建</div>
      <button class="canvas-context-item" type="button" role="menuitem" data-canvas-action="new-note">
        <span>想法卡片</span><small>NOTE</small>
      </button>
      <button class="canvas-context-item" type="button" role="menuitem" data-canvas-action="new-page">
        <span>网页卡片</span><small>PAGE</small>
      </button>
    </div>

    <!-- Interactive Tips Panel -->
    <div class="tips-panel collapsed" id="tips-panel">
      <div class="tips-toggle" id="tips-toggle" title="快捷键与使用帮助">?</div>
      <div class="tips-content">
        <div class="tips-header-row">
          <span style="font-weight: bold; font-size: 11px; color: #ffffff;">💡 空间画板操作指南</span>
          <button class="tips-close-btn" id="tips-close-btn" title="收起帮助">×</button>
        </div>
        <span><b>左键按住画布 / 中键拖拽 / 空格+左键</b>：平移画布</span>
        <span><b>滚轮滚动</b>：以鼠标指针为中心平滑缩放</span>
        <span><b>右键画布空白处</b>：新建想法或网页卡片</span>
        <span><b>双击画布空白处</b>：在指针位置新建便签</span>
        <span><b>鼠标移至卡片上并按下 Ctrl 键</b>：聚焦放大该目标</span>
        <span><b>按住卡片主体</b>：拖动以改变其空间坐标</span>
        <span><b>点击卡片内文本</b>：直接双击或选中以编辑</span>
      </div>
    </div>

    <!-- Floating Toast Notice -->
    <div class="toast" id="toast"></div>
  </div>

  <script src="../memory-manage/WhiteList.runtime.js"></script>
  <script src="canvas/coordinate.js?v=20260704-1"></script>
  <script src="focus-manage/focus-manager.js?v=20260704-1"></script>
  <script src="card/cards.js?v=20260704-1"></script>
  <script src="../memory-manage/memory-manager.js?v=20260704-1"></script>
  <script src="canvas/canvas.js?v=20260704-1"></script>
  <script src="card/link-drop-handler.js?v=20260704-1"></script>
  <script src="../Agent/movement-rule.js?v=20260704-1"></script>
  <script src="../Agent/hand/cursor/visual-cursor.js?v=20260705-2"></script>
  <script src="../Agent/hand/general/general.js?v=20260705-1"></script>
  <script src="../Agent/hand/hold/hold.js?v=20260705-4"></script>
  <script src="../Agent/hand/click/click.js?v=20260705-4"></script>
  <script src="../Agent/hand/drag/drag.js?v=20260705-1"></script>
  <script src="../Agent/hand/close/close.js?v=20260705-1"></script>
  <script src="../Agent/hand/zoom/zoom.js?v=20260705-1"></script>
  <script src="../Agent/hand/focus/focus.js?v=20260705-1"></script>
  <script src="../Agent/information.js?v=20260704-1"></script>
  <script src="../Agent/hand.js?v=20260705-9"></script>
  <script src="../test/coordinate-debug.js?v=20260704-1"></script>
  <script src="../test/test-environment.js?v=20260704-1"></script>
  <script src="../test/hand-action-test.js?v=20260705-2"></script>
  <script src="../test/cursor-target-dot.js?v=20260704-1"></script>
  <script src="../test/agent-test-panel.js?v=20260705-5"></script>
</body>
</html>
